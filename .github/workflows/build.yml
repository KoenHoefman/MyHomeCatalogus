name: .NET CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write # Required for reporting on PRs
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore --configuration Release

    # 1. TEST STEP (Generates a .trx report file)
    - name: Test
      run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

    # 2. TEST REPORTER (Visualizes the .trx file in GitHub)
    - name: Test Report
      uses: dorny/test-reporter@v3
      if: always() # Ensures the report is created even if tests fail
      with:
        name: .NET Test Results
        path: "**/test-results.trx"
        reporter: dotnet-trx

    # 3. PUBLISH STEP
    # Target the host project only. It will automatically bundle the .Client project.
    - name: Publish
      run: dotnet publish MyHomeCatalogus/MyHomeCatalogus/MyHomeCatalogus.csproj --no-build --configuration Release --output ./publish
      
    # 4. UPLOAD ARTIFACTS
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: blazor-app-release-${{ github.run_number }}
        path: ./publish
        retention-days: 3